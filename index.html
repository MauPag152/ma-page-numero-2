<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Portefeuille boursier CAD - 11 tickers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #9ca3af;
      margin-bottom: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background-color: #020617;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid #1f2937;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .api-key-box {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .api-key-box input {
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #4b5563;
      background-color: #020617;
      color: #e5e7eb;
      min-width: 220px;
    }
    button {
      background-color: #2563eb;
      color: #f9fafb;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .status {
      font-size: 0.8rem;
      color: #9ca3af;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.9rem;
    }
    thead {
      background: linear-gradient(to right, #111827, #1f2937);
    }
    th, td {
      padding: 8px 10px;
      text-align: right;
      border-bottom: 1px solid #1f2937;
    }
    th:first-child, td:first-child {
      text-align: left;
    }
    tr:hover {
      background-color: #020617;
    }
    .gain {
      color: #22c55e;
      font-weight: 600;
    }
    .loss {
      color: #ef4444;
      font-weight: 600;
    }
    .footer-row {
      background-color: #020617;
      font-weight: 700;
    }
    .footer-row td {
      border-top: 2px solid #4b5563;
      font-size: 1rem;
    }
    .error {
      color: #f97316;
      margin-top: 8px;
      font-size: 0.8rem;
    }
    .edit-note {
      background-color: #1e293b;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 10px;
      border-left: 4px solid #2563eb;
    }
    @media (max-width: 768px) {
      table { font-size: 0.8rem; }
      th, td { padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <h1>Portefeuille boursier CAD</h1>
  <div class="subtitle">
    US stocks convertis USD→CAD + RY.TO natif CAD | Finnhub.io
  </div>

  <div class="container">
    <div class="controls">
      <div class="api-key-box">
        <label for="finnhubKey" style="font-size:0.8rem;">Clé Finnhub :</label>
        <input id="finnhubKey" type="password" placeholder="Colle ta clé ici" />
        <button id="saveKeyBtn">Enregistrer la clé</button>
      </div>
      <div>
        <button id="refreshBtn">Rafraîchir maintenant</button>
        <div class="status" id="statusText">Clé non enregistrée.</div>
      </div>
    </div>
    <div class="edit-note">
      📝 <strong>Modifier :</strong> Change <code>quantite</code> et <code>prixAchat</code> dans <code>portfolio</code> (lignes 106-117).
    </div>
    <div class="error" id="errorText"></div>

    <table>
      <thead>
        <tr>
          <th>Symbole</th>
          <th>Quantité</th>
          <th>Prix achat</th>
          <th>Capital investi CAD</th>
          <th>Prix actuel CAD</th>
          <th>Valeur actuelle CAD</th>
          <th>Gain/Perte CAD</th>
          <th>Gain/Perte %</th>
        </tr>
      </thead>
      <tbody id="portfolioBody"></tbody>
    </table>
  </div>

  <script>
    // === TES 11 POSITIONS (CAD) ================================
    const portfolio = [
      { ticker: "NVDA",  quantite: 3,  prixAchat: 400, isCAD: false },
      { ticker: "AAPL",  quantite: 10, prixAchat: 150, isCAD: false },
      { ticker: "GOOG",  quantite: 5,  prixAchat: 140, isCAD: false },
      { ticker: "MSFT",  quantite: 4,  prixAchat: 300, isCAD: false },
      { ticker: "AMZN",  quantite: 2,  prixAchat: 130, isCAD: false },
      { ticker: "AVGO",  quantite: 1,  prixAchat: 800, isCAD: false },
      { ticker: "META",  quantite: 3,  prixAchat: 250, isCAD: false },
      { ticker: "TSLA",  quantite: 6,  prixAchat: 200, isCAD: false },
      { ticker: "WMT",   quantite: 8,  prixAchat: 60,  isCAD: false },
      { ticker: "LLY",   quantite: 2,  prixAchat: 500, isCAD: false },
      
    // ===========================================================

    // Taux USD/CAD actuel (≈1.37) - met à jour manuellement [web:61]
    const USD_TO_CAD = 1.37;

    let FINNHUB_API_KEY = "";

    const keyInput   = document.getElementById("finnhubKey");
    const saveKeyBtn = document.getElementById("saveKeyBtn");
    const statusText = document.getElementById("statusText");
    const errorText  = document.getElementById("errorText");
    const portfolioBody = document.getElementById("portfolioBody");
    const refreshBtn = document.getElementById("refreshBtn");

    // Charger clé localStorage
    const savedKey = localStorage.getItem("FINNHUB_API_KEY");
    if (savedKey) {
      FINNHUB_API_KEY = savedKey;
      keyInput.value = "********";
      statusText.textContent = "Clé chargée. Prêt !";
    }

    saveKeyBtn.addEventListener("click", () => {
      const val = keyInput.value.trim();
      if (!val) {
        alert("Entre une clé Finnhub valide.");
        return;
      }
      FINNHUB_API_KEY = val;
      localStorage.setItem("FINNHUB_API_KEY", val);
      keyInput.value = "********";
      statusText.textContent = "Clé Finnhub enregistrée.";
    });

    async function fetchQuote(symbol) {
      if (!FINNHUB_API_KEY || !symbol) return 0;
      const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(symbol)}&token=${FINNHUB_API_KEY}`;
      try {
        const resp = await fetch(url);
        if (!resp.ok) return 0;
        const data = await resp.json();
        return data.c || 0;
      } catch {
        return 0;
      }
    }

    async function fetchAllPrices() {
      if (!FINNHUB_API_KEY) {
        errorText.textContent = "Enregistre ta clé Finnhub.";
        return;
      }
      errorText.textContent = "";
      statusText.textContent = "Chargement… (USD→CAD 1.37)";
      refreshBtn.disabled = true;

      try {
        const prices = {};
        for (const pos of portfolio) {
          if (pos.ticker) {
            prices[pos.ticker] = await fetchQuote(pos.ticker);
          }
        }
        renderTable(prices);
        const now = new Date();
        statusText.textContent = "Mis à jour : " + now.toLocaleTimeString();
      } catch (err) {
        errorText.textContent = "Erreur: " + err.message;
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function renderTable(priceMap) {
      portfolioBody.innerHTML = "";
      let totalQuantite = 0;
      let totalCapitalCAD = 0;
      let totalValeurCAD = 0;
      let totalGainCAD = 0;
      let totalInvestiCAD = 0;

      portfolio.forEach(pos => {
        const prixUSD = priceMap[pos.ticker] || 0;
        const prixCAD = pos.isCAD ? prixUSD : prixUSD * USD_TO_CAD;
        const capitalInvestiCAD = pos.quantite * pos.prixAchat;
        const valeurActuelleCAD = pos.quantite * prixCAD;
        const gainCAD = valeurActuelleCAD - capitalInvestiCAD;
        const gainPct = capitalInvestiCAD !== 0 ? (gainCAD / capitalInvestiCAD) * 100 : 0;

        totalQuantite += pos.quantite;
        totalCapitalCAD += capitalInvestiCAD;
        totalValeurCAD += valeurActuelleCAD;
        totalGainCAD += gainCAD;
        if (capitalInvestiCAD > 0) totalInvestiCAD += capitalInvestiCAD;

        const tr = document.createElement("tr");

        const tdSym = document.createElement("td");
        tdSym.textContent = pos.ticker;
        tr.appendChild(tdSym);

        const tdQ = document.createElement("td");
        tdQ.textContent = pos.quantite;
        tr.appendChild(tdQ);

        const tdPA = document.createElement("td");
        tdPA.textContent = pos.prixAchat.toFixed(2);
        tr.appendChild(tdPA);

        const tdCapital = document.createElement("td");
        tdCapital.textContent = capitalInvestiCAD.toFixed(2);
        tr.appendChild(tdCapital);

        const tdPrix = document.createElement("td");
        tdPrix.textContent = prixCAD ? prixCAD.toFixed(2) : "N/D";
        tr.appendChild(tdPrix);

        const tdVal = document.createElement("td");
        tdVal.textContent = valeurActuelleCAD.toFixed(2);
        tr.appendChild(tdVal);

        const tdGain = document.createElement("td");
        tdGain.textContent = gainCAD.toFixed(2);
        tdGain.className = gainCAD >= 0 ? "gain" : "loss";
        tr.appendChild(tdGain);

        const tdGainPct = document.createElement("td");
        tdGainPct.textContent = gainPct.toFixed(2) + "%";
        tdGainPct.className = gainPct >= 0 ? "gain" : "loss";
        tr.appendChild(tdGainPct);

        portfolioBody.appendChild(tr);
      });

      // Totaux
      const trTotal = document.createElement("tr");
      trTotal.className = "footer-row";

      const tdLabel = document.createElement("td");
      tdLabel.textContent = "TOTAL CAD";
      trTotal.appendChild(tdLabel);

      const tdTotalQ = document.createElement("td");
      tdTotalQ.textContent = totalQuantite.toFixed(0);
      trTotal.appendChild(tdTotalQ);

      const tdTotalPA = document.createElement("td");
      tdTotalPA.textContent = "-";
      trTotal.appendChild(tdTotalPA);

      const tdTotalCapital = document.createElement("td");
      tdTotalCapital.textContent = totalCapitalCAD.toFixed(2);
      trTotal.appendChild(tdTotalCapital);

      const tdTotalPrix = document.createElement("td");
      tdTotalPrix.textContent = "-";
      trTotal.appendChild(tdTotalPrix);

      const tdTotalVal = document.createElement("td");
      tdTotalVal.textContent = totalValeurCAD.toFixed(2);
      trTotal.appendChild(tdTotalVal);

      const tdTotalGain = document.createElement("td");
      tdTotalGain.textContent = totalGainCAD.toFixed(2);
      tdTotalGain.className = totalGainCAD >= 0 ? "gain" : "loss";
      trTotal.appendChild(tdTotalGain);

      const tdTotalPct = document.createElement("td");
      const totalGainPct = totalInvestiCAD > 0 ? (totalGainCAD / totalInvestiCAD) * 100 : 0;
      tdTotalPct.textContent = totalGainPct.toFixed(2) + "%";
      tdTotalPct.className = totalGainPct >= 0 ? "gain" : "loss";
      trTotal.appendChild(tdTotalPct);

      portfolioBody.appendChild(trTotal);
    }

    refreshBtn.addEventListener("click", fetchAllPrices);
    setInterval(fetchAllPrices, 60000);
  </script>
</body>
</html>
