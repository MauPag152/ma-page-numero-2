!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Boursier Pro</title>
    <!-- Chargement de Chart.js pour les graphiques -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --primary: #1a2a3a; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 250px; }
        
        .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #7f8c8d; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .positive { color: var(--success); }
        .negative { color: var(--danger); }
        canvas { max-width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="card header-flex">
        <h1>Analyse de Portefeuille</h1>
        <div>
            <input type="password" id="apiKey" placeholder="Clé API Finnhub">
            <button class="btn btn-primary" onclick="saveKey()">Sauvegarder Clé</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- Tableau des actifs -->
        <div class="card">
            <div class="header-flex" style="margin-bottom:15px;">
                <h3>Mes Positions</h3>
                <button class="btn btn-success" onclick="updateAll()">🔄 Actualiser les cours</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Symbole</th>
                        <th>Quantité</th>
                        <th>Prix Actuel</th>
                        <th>Valeur Totale</th>
                        <th>Profit/Perte</th>
                    </tr>
                </thead>
                <tbody id="stockTable">
                    <!-- Généré par JS -->
                </tbody>
            </table>
        </div>

        <!-- Graphique -->
        <div class="card">
            <h3>Répartition de l'Actif</h3>
            <canvas id="portfolioChart"></canvas>
            <div style="margin-top: 20px; text-align: center;">
                <h4 id="grandTotal">Total: 0,00 $</h4>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. DÉFINISSEZ VOS PLACEMENTS ICI
    const myPortfolio = [
        { symbol: 'AAPL', qty: 15, buyPrice: 170.00 },
        { symbol: 'MSFT', qty: 10, buyPrice: 320.00 },
        { symbol: 'GOOGL', qty: 5, buyPrice: 140.00 },
        { symbol: 'TSLA', qty: 8, buyPrice: 190.00 }
    ];

    let chartInstance = null;

    function saveKey() {
        localStorage.setItem('finnhub_token', document.getElementById('apiKey').value);
        alert("Clé API configurée !");
    }

    async function getPrice(symbol) {
        const token = localStorage.getItem('finnhub_token') || document.getElementById('apiKey').value;
        if (!token) return null;
        try {
            const res = await fetch(`https://finnhub.io{symbol}&token=${token}`);
            const data = await res.json();
            return data.c; // 'c' = Current Price
        } catch (e) { return null; }
    }

    async function updateAll() {
        const tbody = document.getElementById('stockTable');
        let totalPortfolioValue = 0;
        let labels = [];
        let values = [];
        
        tbody.innerHTML = '<tr><td colspan="5">Récupération des données...</td></tr>';
        let rowsHtml = '';

        for (let stock of myPortfolio) {
            const currentPrice = await getPrice(stock.symbol);
            const totalValue = currentPrice * stock.qty;
            const profit = (currentPrice - stock.buyPrice) * stock.qty;
            
            totalPortfolioValue += totalValue;
            labels.push(stock.symbol);
            values.push(totalValue.toFixed(2));

            rowsHtml += `
                <tr>
                    <td><strong>${stock.symbol}</strong></td>
                    <td>${stock.qty}</td>
                    <td>${currentPrice ? currentPrice.toFixed(2) + ' $' : 'N/A'}</td>
                    <td>${totalValue.toLocaleString()} $</td>
                    <td class="${profit >= 0 ? 'positive' : 'negative'}">
                        ${profit >= 0 ? '+' : ''}${profit.toFixed(2)} $
                    </td>
                </tr>`;
        }

        tbody.innerHTML = rowsHtml;
        document.getElementById('grandTotal').innerText = `Valeur Totale : ${totalPortfolioValue.toLocaleString()} $`;
        updateChart(labels, values);
    }

    function updateChart(labels, data) {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: ['#3498db', '#2ecc71', '#f1c40f', '#e74c3c', '#9b59b6']
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    window.onload = () => {
        const savedKey = localStorage.getItem('finnhub_token');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        updateAll();
    };
</script>

</body>
</html>
